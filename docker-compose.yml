# Works two ways from ONE file:
#   • Local:          `docker compose up -d`  (auto-loads values from .env)
#   • Portainer Git:  Add stack → Repository → this file; set the same vars in
#                     Portainer's "Environment variables" panel. Portainer has
#                     the repo checkout, so `build:` works — no pre-built image.
#
# All app config is passed via ${VAR} substitution (not env_file), so the exact
# same compose file resolves correctly in both environments.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-basecamp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-basecamp}
      POSTGRES_DB: ${POSTGRES_DB:-basecamp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-basecamp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-basecamp}:${POSTGRES_PASSWORD:-basecamp}@db:5432/${POSTGRES_DB:-basecamp}
      BASECAMP_CLIENT_ID: ${BASECAMP_CLIENT_ID}
      BASECAMP_CLIENT_SECRET: ${BASECAMP_CLIENT_SECRET}
      BASECAMP_REDIRECT_URI: ${BASECAMP_REDIRECT_URI:-http://localhost:8000/oauth/callback}
      BASECAMP_USER_AGENT: ${BASECAMP_USER_AGENT:-BasecampButtler (set-a-contact@example.com)}
      NOTIFY_CHANNEL: ${NOTIFY_CHANNEL:-ntfy}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      WEB_AUTH_TOKEN: ${WEB_AUTH_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      POLL_INTERVAL_MINUTES: ${POLL_INTERVAL_MINUTES:-5}
      DUE_SOON_DAYS: ${DUE_SOON_DAYS:-3}
      POLL_CAMPFIRE: ${POLL_CAMPFIRE:-true}
      POLL_PINGS: ${POLL_PINGS:-true}
      CLASSIFIER: ${CLASSIFIER:-rules}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_PROXY: ${OLLAMA_PROXY:-}
    ports:
      - "${WEB_PORT:-8000}:8000"

  # Optional: reach an Ollama that lives on another Tailscale node when the host
  # can't route to the tailnet (e.g. a Synology without /dev/net/tun, where the
  # Tailscale package runs in userspace mode). This sidecar joins your tailnet in
  # userspace mode (no TUN, no privileges) and exposes an outbound HTTP proxy on
  # :1055; point the app at it with OLLAMA_PROXY=http://tailscale:1055 and
  # OLLAMA_URL=http://<ollama-tailnet-ip>:11434.
  #
  # Inert until you set a Tailscale auth key in TS_AUTHKEY (admin console →
  # Settings → Keys). If you don't use Tailscale, just delete this service and
  # the ts-state volume below — leaving it without a key only runs an idle,
  # unauthenticated container. (No Compose profile: Portainer Git stacks don't
  # reliably honour COMPOSE_PROFILES, so gating it that way silently skipped it.)
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    hostname: ${TS_HOSTNAME:-basecamp-butler}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_USERSPACE: "true"
      TS_STATE_DIR: /var/lib/tailscale
      TS_OUTBOUND_HTTP_PROXY_LISTEN: 0.0.0.0:1055
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:-}
    volumes:
      - ts-state:/var/lib/tailscale

volumes:
  pgdata:
  ts-state:
